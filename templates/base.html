<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Strike Zone | Cricket Nets & Bowling Machine</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        :root {
            --primary: #B6FF00;
            --dark: #0b0b0b;
            --card: #171717;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            background:#0b0b0b;
            color:#fff;
            font-family:'Poppins',sans-serif;
        }

        /* Navbar */
        .navbar{
            background: rgba(17,17,17,0.98);
            backdrop-filter: blur(12px);
            padding:15px 0;
        }

        .navbar-brand{
            color:#B6FF00 !important;
            font-weight:700;
            font-size:26px;
            letter-spacing: -1px;
        }

        /* Responsive Headings - Mobile First */
        h1, .display-3, .display-4 {
            font-size: 1.85rem !important;     /* Mobile lo chinnaga */
            line-height: 1.15;
        }

        .lead {
            font-size: 1.02rem !important;
        }

        .section-title {
            color:#B6FF00;
            font-weight:700;
            font-size: 1.9rem !important;
            position: relative;
            display: inline-block;
        }

        /* Desktop lo peddaga */
        @media (min-width: 768px) {
            h1, .display-3, .display-4 {
                font-size: 3.2rem !important;
            }
            .lead {
                font-size: 1.25rem !important;
            }
            .section-title {
                font-size: 2.7rem !important;
            }
            .navbar-brand {
                font-size: 32px;
            }
        }

        .nav-link{
            color:#ddd !important;
            margin-left:16px;
            font-weight:500;
            transition:all .3s ease;
        }

        .nav-link:hover{
            color:#B6FF00 !important;
        }

        .btn-book{
            background:#B6FF00;
            color:#000;
            border:none;
            border-radius:50px;
            padding:11px 26px;
            font-weight:600;
            box-shadow:0 5px 20px rgba(182,255,0,0.3);
        }

        .btn-book:hover{
            background:#d2ff4d;
            transform:translateY(-3px);
        }

        /* Cards */
        .card{
            background:#171717;
            border:1px solid #2b2b2b;
            border-radius:18px;
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-8px);
            border-color:#B6FF00;
            box-shadow:0 0 20px rgba(182,255,0,.25);
        }

        .text-secondary{
            color:#cfcfcf !important;
        }
    </style>
</head>

<body>

    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
